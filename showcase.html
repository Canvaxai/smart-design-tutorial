<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIデザイン実例集｜AI×スマホ アフィリエイト攻略ガイド</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <nav class="p-4 flex justify-between items-center max-w-4xl mx-auto sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md">
        <a href="sitemap.html" class="text-slate-400 hover:text-white transition-colors no-underline">⬅ ロードマップ</a>
        <div class="w-8 h-8 bg-gradient-to-tr from-blue-500 to-emerald-500 rounded-full"></div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-12">
            <h1 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter leading-tight">Showcase</h1>
            <p class="text-slate-400 text-lg">スマホとAIだけで、ここまでのクオリティは生み出せる。</p>
        </header>

        <div class="rounded-[40px] overflow-hidden border border-slate-700 bg-slate-800/50 shadow-2xl mb-12">
            <div class="p-6 md:p-12">
                <div class="flex items-center space-x-2 mb-8">
                    <span class="w-3 h-3 rounded-full bg-red-500"></span>
                    <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                </div>
                
                <h2 class="text-2xl md:text-3xl font-black mb-6">3. マネタイズの導線を貼る</h2>
                <p class="text-slate-300 mb-8 leading-relaxed text-sm md:text-base">
                    記事の中に、デザインツールCanvaの魅力を伝え、リンクを設置します。
                </p>

                <div class="bg-white/5 p-8 rounded-[32px] border-l-4 border-pink-500">
                    <p class="text-pink-400 font-black mb-4">★ このページの「真の狙い（収益化）」</p>
                    <p class="text-slate-300 text-sm leading-loose mb-6">
                        読者が「これなら自分にもできそう！」と感じた瞬間に、プロ級の画像が作れる「Canva Pro」を紹介します。無料体験に登録してもらうだけで、あなたに紹介料が入る仕組みです。
                    </p>
                    <a href="https://www.canva.com/ja_jp/" target="_blank" rel="noopener noreferrer" class="inline-block bg-white text-slate-900 font-black py-4 px-8 rounded-full hover:bg-slate-200 transition-all no-underline shadow-lg text-sm">
                        ➡ Canva Proを無料で試してみる（公式サイトへ）
                    </a>
                </div>
            </div>
        </div>

        <div class="text-center mt-20">
            <h3 class="text-2xl font-bold mb-8">「自分にもできそう！」と思いませんでしたか？</h3>
            <a href="sitemap.html" class="inline-block bg-white text-black font-black py-4 px-12 rounded-full no-underline hover:scale-105 transition-transform">
                攻略ロードマップへ戻る
            </a>
        </div>
    </main>

    <footer class="py-16 text-center border-t border-slate-800">
        <a href="https://x.com/hoshi_tomokazu" target="_blank" class="text-slate-500 hover:text-white no-underline text-xs tracking-widest uppercase">Follow @hoshi_tomokazu</a>
    </footer>
